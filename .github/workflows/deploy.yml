name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'k8s/deployment.yaml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontendprod:${{ github.sha }} .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/frontendprod:${{ github.sha }}

      - name: Update Kubernetes manifest
        run: |
          sed -i 's|image:.*|image: ${{ secrets.DOCKER_USERNAME }}/frontendprod:${{ github.sha }}|' k8s/deployment.yaml

      - name: Commit changes
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          git add k8s/deployment.yaml
          git commit -m "Update image to ${{ github.sha }}" || echo "No changes to commit"
          git push